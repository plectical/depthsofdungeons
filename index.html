    <!-- Early boot crash detection — fires BEFORE any module JS loads.
         Captures errors that kill the session before React/SDK can report. -->
    <script>
    (function(){
      var t0 = Date.now();
      window.__bootTimestamp = t0;
      window.__bootPhase = 'html_parsed';
      window.__bootErrors = [];

      // Collect device fingerprint for crash correlation
      var nav = navigator || {};
      window.__bootDevice = {
        ua: (nav.userAgent || '').slice(0, 200),
        lang: nav.language || '',
        mem: nav.deviceMemory || -1,
        cores: nav.hardwareConcurrency || -1,
        online: nav.onLine !== false,
        conn: (nav.connection || nav.mozConnection || nav.webkitConnection || {}).effectiveType || '',
        screen_w: screen.width || 0,
        screen_h: screen.height || 0,
        dpr: window.devicePixelRatio || 1,
        touch: 'ontouchstart' in window
      };

      // Catch any error that happens before our module JS loads
      window.addEventListener('error', function(e){
        if (window.__bootErrors.length >= 10) return;
        window.__bootErrors.push({
          ts: Date.now() - t0,
          phase: window.__bootPhase || 'unknown',
          msg: (e.message || '').slice(0, 300),
          src: (e.filename || '').slice(-80),
          line: e.lineno || 0,
          col: e.colno || 0
        });
      });
      window.addEventListener('unhandledrejection', function(e){
        if (window.__bootErrors.length >= 10) return;
        var reason = e.reason;
        var msg = reason instanceof Error ? reason.message : String(reason || '');
        window.__bootErrors.push({
          ts: Date.now() - t0,
          phase: window.__bootPhase || 'unknown',
          msg: msg.slice(0, 300),
          src: 'promise',
          line: 0,
          col: 0
        });
      });
    })();
    </script>
